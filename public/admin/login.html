<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Vix Cursos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Load mock API interceptor first to work offline/client-only -->
    <script src="/mock-api.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --bg: #030712;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --danger: #f87171;
            --success: #34d399;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: Inter, "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(3, 7, 18, 0.88), rgba(7, 17, 31, 0.85), rgba(15, 23, 42, 0.9)),
                url("../imagem/terceira_ponte.png") center bottom / cover no-repeat fixed;
            display: grid;
            place-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphism card */
        .glass-card {
            width: min(420px, calc(100vw - 32px));
            padding: 44px 36px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: rgba(10, 18, 36, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 100px;
            height: 75px;
            border-radius: 18px;
            background: rgba(2, 6, 23, 0.4) url("../imagem/VIxcursos.png") center / contain no-repeat;
            box-shadow: 
                0 10px 30px rgba(124, 58, 237, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
        }

        .logo-mark:hover {
            transform: scale(1.04);
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.15rem;
            transition: color 0.25s;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 16px 15px 46px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-light);
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
        }

        .input-wrapper input:focus + i {
            color: var(--primary-light);
        }

        .button {
            border: 0;
            border-radius: 14px;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.3);
            filter: brightness(1.15);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 0.88rem;
            text-align: center;
            min-height: 22px;
            transition: color 0.2s;
            width: 100%;
        }

        .status.error { color: var(--danger); }
        .status.success { color: var(--success); }
        .status.info { color: var(--muted); }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 1;
            pointer-events: none;
            animation: pulse 10s ease-in-out infinite alternate;
        }
        .orb-1 { width: 320px; height: 320px; background: var(--primary); top: 15%; left: 20%; }
        .orb-2 { width: 280px; height: 280px; background: #3b82f6; bottom: 15%; right: 20%; animation-delay: -4s; }

        @keyframes pulse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.08); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="glass-card">
        <div class="logo-container">
            <div class="logo-mark"></div>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <div class="input-wrapper">
                    <input id="username" name="username" type="text" placeholder="Usuário" required autofocus>
                    <i class="bi bi-person"></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input id="password" name="password" type="password" placeholder="Senha" required>
                    <i class="bi bi-lock"></i>
                </div>
            </div>

            <button class="button" id="submitBtn" type="submit">
                Entrar
            </button>
        </form>

        <div class="status" id="statusMsg" aria-live="polite"></div>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        function setStatus(message, type = '') {
            statusMsg.textContent = message;
            statusMsg.className = `status ${type}`.trim();
        }

        async function verificarSessao() {
            try {
                const res = await fetch('/api/admin/me');
                if (res.ok) {
                    window.location.href = 'menu.html';
                }
            } catch (error) {
                console.error('Falha ao verificar sessão:', error);
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            submitBtn.disabled = true;
            setStatus('Validando acesso...', 'info');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    setStatus(data.error || 'Credenciais inválidas.', 'error');
                    submitBtn.disabled = false;
                    passwordInput.value = '';
                    passwordInput.focus();
                    return;
                }

                setStatus('Acesso liberado. Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 400);
            } catch (error) {
                console.error(error);
                setStatus('Falha na comunicação com o servidor.', 'error');
                submitBtn.disabled = false;
            }
        });

        verificarSessao();
    </script>
</body>
</html>
