<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário Pré-Certificado | Vix Cursos</title>
    <script src="/mock-api.js"></script>
    <style>
        body {
            background: #090f1d;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .survey-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            color: #ff8a5a;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #1f2937;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        select:focus, textarea:focus {
            outline: 2px solid #ff8a5a;
            border-color: transparent;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ff8a5a;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #f97316;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="survey-card">
        <h1>Avaliação de Conclusão</h1>
        <p style="text-align: center; font-size: 0.8rem; color: #9ca3af; margin-bottom: 25px;">Por favor, responda as perguntas abaixo para liberar o seu certificado.</p>
        <form id="surveyForm" onsubmit="enviarRespostas(event)">
            <div class="form-group">
                <label>Você conseguiu emprego na área após o curso?</label>
                <select id="emprego_pos_curso" required>
                    <option value="">-- Selecione --</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                    <option value="processo">Em processo</option>
                </select>
            </div>
            <div class="form-group">
                <label>O curso contribuiu para sua situação profissional? (Escala de 1 a 5)</label>
                <select id="contribuicao_profissional" required>
                    <option value="">-- Selecione --</option>
                    <option value="1">1 - Nada</option>
                    <option value="2">2 - Pouco</option>
                    <option value="3">3 - Razoavelmente</option>
                    <option value="4">4 - Muito</option>
                    <option value="5">5 - Transformador</option>
                </select>
            </div>
            <div class="form-group">
                <label>Você recomendaria este curso?</label>
                <select id="recomendaria" required>
                    <option value="">-- Selecione --</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>
            <div class="form-group">
                <label>Qual foi o principal benefício do curso para você?</label>
                <textarea id="beneficio_principal" rows="3" required placeholder="Ex: aprendi novas técnicas, consegui contatos, etc."></textarea>
            </div>
            <button type="submit">Enviar e Liberar Certificado</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            alert('ID da inscrição não fornecido.');
            window.location.href = '/';
        }

        async function enviarRespostas(e) {
            e.preventDefault();
            const data = {
                emprego_pos_curso: document.getElementById('emprego_pos_curso').value,
                contribuicao_profissional: document.getElementById('contribuicao_profissional').value,
                recomendaria: document.getElementById('recomendaria').value,
                beneficio_principal: document.getElementById('beneficio_principal').value
            };

            try {
                const res = await fetch(`/api/pre-inscricoes/${id}/pesquisa-conclusao`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    window.location.href = `/certificado/${id}`;
                } else {
                    alert('Erro ao enviar as respostas. Tente novamente.');
                }
            } catch (err) {
                console.error(err);
                alert('Erro de conexão.');
            }
        }
    </script>
</body>
</html>
